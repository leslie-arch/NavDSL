defaults:
  - /habitat_baselines: habitat_baselines_rl_config_base
  - /benchmark/nav/objectnav: objectnav_hm3d_with_semantic
  - /habitat/task/lab_sensors:
    - base_explorer
    - compass_sensor
    - gps_sensor
    - heading_sensor
    - frontier_sensor
    - symbolic_fact_sensor
  - /habitat/task/measurements:
    - frontier_exploration_map
    - traveled_stairs
  # 下面语法没问题，但路径越深，Hydra 越容易在中间节点（如 main_agent）处理上出现歧义。
  # 如果识别不到父节点的 Schema，直接选择用“纯字典”重写整个分支。一旦重写，原生字段就会像被“格式化”一样消失。
  # @ 语法像手术刀，切入 Dict（容器）是常规操作，但切入 Object（对象）内部则会破坏对象的完整性
  # 如果是 Dict 成员（如 Policy, Measurement, Sensor）：使用 @ 注入是安全的 (如dsl_policy)
  # 如果是 Object 属性（如 Agent 的某个参数）：禁止使用 @ 注入，直接在 YAML 下方写。
  #  - /habitat/simulator/sim_sensors@habitat.simulator.agents.main_agent.sim_sensors.symbolic_fact_sensor: symbolic_fact_sensor
  # - /habitat/task/lab_sensors@habitat.task.lab_sensors.symbolic_fact_sensor: symbolic_fact_sensor
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.dsl_policy: dsl_policy
  # 下面这种写法，"/habitat_baselines/rl/policy/"最后的这个'/'一定要有
  # 有斜杠被解释为“在 policy 路径下添加/插入一个名为 dsl_policy 的条目”
  # 否则，Hydra 将其解释为“将整个 policy 组重定向或赋值为 dsl_policy”
  # - /habitat_baselines/rl/policy/: dsl_policy
  - _self_

g_split: "train"


habitat:
  simulator:
    debug_render: True
    create_renderer: True
    navmesh_include_static_objects: True
    scene: ""
    scene_dataset: /home/hjk/dataset/scene_datasets/hm3d_v0.2/${g_split}/hm3d_annotated_${g_split}_basis.scene_dataset_config.json
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            type: HabitatSimRGBSensor
            height: 480
            width: 640
          depth_sensor:
            type: HabitatSimDepthSensor
            min_depth: 0.0
            max_depth: 10.0
            normalize_depth: True
            height: 480
            width: 640
          # Ensure this block exists and isn't empty
          semantic_sensor:
            type: HabitatSimSemanticSensor
            height: 480
            width: 640
          # symbolic_fact_sensor:
          #   type: HabitatSimSymbolicFactSensor
          #   height: 480
          #   width: 640
    habitat_sim_v0:
      gpu_device_id: 0
      enable_physics: True
  environment:
    iterator_options:
      max_scene_repeat_steps: 50000
  task:
    success_reward: 2.5
    slack_reward: -1e-3
    lab_sensors:
      base_explorer:
        turn_angle: 30
    measurements:
      frontier_exploration_map:
        draw_goal_aabbs: True
  # habitat.core.dataset.Dataset
  # @registry.register_dataset(name="MyCustomDataset-v1")
  dataset:
    type:  ObjectNav-HM3D-v1  # InstanceImageNav-v1
    split: ${g_split}
    content_scenes: ["*"]  # [ "qgZhhx1MpTi" ]
    # 指向 3D 模型 (.glb) 根目录
    scenes_dir: /home/hjk/dataset/scene_datasets
    # 指向任务定义 (.json.gz) 路径，使用占位符
    data_path: /home/hjk/dataset/datasets/objectnav/hm3d/v2/objectnav_hm3d_v2/${g_split}/${g_split}.json.gz
    # data_path: /home/hjk/sshfs_root/dataset/habitat-data/datasets/instance_imagenav/hm3d/v3/instance_imagenav_hm3d_v3/${g_split}/${g_split}.json.gz

habitat_baselines:
  evaluate: False
  eval_ckpt_path_dir: data/dummy_policy.pth
  num_environments: 1
  load_resume_state_config: False

  torch_gpu_id: 0
  tensorboard_dir: "tb"
  video_dir: "video_dir"
  test_episode_count: -1
  checkpoint_folder: "data/new_checkpoints"
  trainer_name: "dsl"
  num_updates: 200  # 270000
  log_interval: 10
  num_checkpoints: 2  # 100
  # Force PyTorch to be single threaded as
  # this improves performance considerably
  force_torch_single_threaded: True

  # eval:
  #   split: "val"

    #在 Habitat-Lab 0.3.3 的 RLConfig 定义中，policy 被定义为一个字典（Map），而不是一个单一的对象。
    #当试图在 YAML 中直接修改 habitat_baselines.rl.policy.name 时，
    #Hydra 认为你是在向这个字典里添加一个 Key 叫 "name" 的配置项。
    #根据约束，这个配置项的 Value 必须是一个 PolicyConfig 对象，而你给的是字符串 "HabitatITMPolicy"，所以报错。
    #由于 policy 是一个字典，注册的 dsl_policy 实际上是这个字典里的一个“成员”。你需要先进入这个成员，再修改它的属性。
  rl:
    # policy:
    #   dsl_policy:
    #     name: "HabitatITMPolicy"

    ppo:
      # ppo params
      clip_param: 0.2
      ppo_epoch: 4
      num_mini_batch: 1
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.2
      num_steps: 64
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: False
      reward_window_size: 50
      use_normalized_advantage: False
      hidden_size: 512

    ddppo:
      sync_frac: 0.6
      # The PyTorch distributed backend to use
      distrib_backend: NCCL
      # Visual encoder backbone
      pretrained_weights: data/ddppo-models/gibson-2plus-resnet50.pth
      # Initialize with pretrained weights
      pretrained: False
      # Initialize just the visual encoder backbone with pretrained weights
      pretrained_encoder: False
      # Whether or not the visual encoder backbone will be trained.
      train_encoder: True
      # Whether or not to reset the critic linear layer
      reset_critic: False
      # Model parameters
      backbone: resnet50
      rnn_type: LSTM
      num_recurrent_layers: 2

